name: CI Kotlin Android (Reusable)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      jdk-version:
        type: string
        default: '17'
      jdk-distribution:
        type: string
        default: 'temurin'
      working-directory:
        type: string
        default: '.'
      run-instrumented:
        type: boolean
        default: false
        description: 'Roda testes instrumentados em emulador (lento, custoso)'
      coverage-threshold:
        type: number
        default: 30
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: ktlint + detekt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.jdk-distribution }}
          java-version: ${{ inputs.jdk-version }}
      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon || ./gradlew lintKotlin --no-daemon
        continue-on-error: false

      - name: Run detekt
        run: ./gradlew detekt --no-daemon
        continue-on-error: false

  unit-test:
    name: Unit tests (JUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.jdk-distribution }}
          java-version: ${{ inputs.jdk-version }}
      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Enforce coverage threshold
        if: always()
        run: |
          REPORT=$(find . -path '*/jacoco/test/jacocoTestReport.xml' | head -1)
          if [ -n "$REPORT" ]; then
            COV=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('$REPORT').getroot()
          for c in root.findall('counter'):
              if c.get('type') == 'LINE':
                  m = int(c.get('missed')); cov = int(c.get('covered'))
                  total = m + cov
                  print(int(100 * cov / total) if total else 0)
                  break
          ")
            echo "Line coverage: $COV%"
            if [ "$COV" -lt "${{ inputs.coverage-threshold }}" ]; then
              echo "::error::Coverage $COV% below threshold ${{ inputs.coverage-threshold }}%"
              exit 1
            fi
          else
            echo "::warning::Jacoco report not found"
          fi

      - if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: ${{ inputs.working-directory }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            ${{ inputs.working-directory }}/**/build/reports/tests
            ${{ inputs.working-directory }}/**/build/reports/jacoco
          retention-days: 7

  assemble:
    name: Assemble debug
    needs: [static-analysis, unit-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.jdk-distribution }}
          java-version: ${{ inputs.jdk-version }}
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew assembleDebug --no-daemon

  instrumented:
    name: Instrumented tests
    if: ${{ inputs.run-instrumented }}
    needs: unit-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.jdk-distribution }}
          java-version: ${{ inputs.jdk-version }}
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest --no-daemon
