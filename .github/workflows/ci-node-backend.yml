name: CI Node Backend (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      package-manager:
        type: string
        default: 'pnpm'
        description: 'pnpm | npm | yarn'
      coverage-threshold:
        type: number
        default: 50
      working-directory:
        type: string
        default: '.'
      run-build:
        type: boolean
        default: true
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install & cache
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || inputs.package-manager == 'yarn' && 'yarn.lock' || 'package-lock.json' }}

      - name: Install dependencies
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    npm ci ;;
          esac

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install --frozen-lockfile
      - name: Run ESLint (if defined)
        run: ${{ inputs.package-manager }} run lint --if-present

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install --frozen-lockfile
      - name: Run typecheck (if defined)
        run: ${{ inputs.package-manager }} run typecheck --if-present

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install --frozen-lockfile

      - name: Run tests with coverage (if defined)
        run: ${{ inputs.package-manager }} run test:cov --if-present
        env:
          CI: true

      - name: Enforce coverage threshold
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -p "Math.floor(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "Line coverage: $PCT%"
            if [ "$PCT" -lt "${{ inputs.coverage-threshold }}" ]; then
              echo "::error::Coverage $PCT% is below threshold ${{ inputs.coverage-threshold }}%"
              exit 1
            fi
          else
            echo "::warning::coverage/coverage-summary.json not found; skipping threshold check"
          fi

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: ${{ inputs.working-directory }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

  build:
    name: Build
    if: ${{ inputs.run-build }}
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager }} install --frozen-lockfile
      - run: ${{ inputs.package-manager }} run build --if-present
