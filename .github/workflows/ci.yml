name: CI

# CI próprio do devops-hub (infra/tooling). Os workflows reutilizáveis
# (ci-node-*.yml) são consumidos pelos repos de produto via workflow_call;
# aqui só validamos os scripts deste repo.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Opt-in ao runtime Node 24 (silencia o aviso de deprecação do Node 20 nos actions JS)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  demo:
    name: Demo app (saída do pipeline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:cov
      - run: npm run build
